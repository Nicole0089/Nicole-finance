<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>各類收入明細</title>
<style>
  :root{
    --header:#1B5E20;
    --teal:#00695C;
    --orange:#E65100;
    --bg:#F5F5F0;
    --card:#FFFFFF;
    --border:#E0E0DA;
    --text:#212121;
    --sub:#757575;
    --green:#2E7D32;
    --red:#C62828;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system,"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:74px; font-size:19px;
  }
  header{
    background:var(--header); color:#E8F5E9; padding:16px 18px 14px;
    position:sticky; top:0; z-index:20;
  }
  header .top-row{display:flex; align-items:center; justify-content:space-between;}
  header .title-area .h-label{font-size:22px; font-weight:600;}
  header .title-area .h-sub{font-size:15px; opacity:0.85; margin-top:2px;}

  .summary-cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px;}
  .summary-cards .scard:first-child{grid-column:1 / -1;}
  .scard{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px;}
  .scard .lab{font-size:15px; color:var(--sub); margin:0 0 4px;}
  .scard .val{font-size:23px; font-weight:600; margin:0; white-space:nowrap;}
  .summary-cards .scard:not(:first-child) .val{font-size:19px;}

  .policy-tabs{display:flex; gap:6px; padding:0 16px 10px;}
  .policy-tabs.main-tabs .ptab{flex:1;}
  .ptab{
    flex:0 0 auto; padding:10px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--card); font-size:17px; color:var(--text); text-align:center;
  }
  .ptab.active{background:var(--teal); color:#fff; border-color:var(--teal);}

  main{padding:0 16px;}
  .view-desc{font-size:13px; color:var(--sub); padding:0 2px 10px;}

  /* ---- 表格 ---- */
  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border); border-radius:12px; background:var(--card);}
  table{width:100%; border-collapse:collapse; font-size:15px; white-space:nowrap;}
  th,td{padding:8px 10px; text-align:right; border-bottom:1px solid var(--border);}
  th:first-child,td:first-child{text-align:left; position:sticky; left:0; background:var(--card); z-index:5;}
  thead th{font-weight:600; color:var(--sub); font-size:13px; background:#FAFAF7; position:sticky; top:0; z-index:6;}
  thead th:first-child{z-index:7;}
  tbody tr:last-child td{border-bottom:none;}
  tr.cur-year td{background:#FFF8E1;}
  thead th:first-child{position:sticky; left:0; top:0;}
  td.amt-pos{color:var(--green); font-weight:600;}
  .note-row{display:block;}
  .note-list{margin-top:10px;}
  .note-row{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 36px 10px 12px; margin-bottom:8px; position:relative;}
  .note-row .note-year{font-size:13px; font-weight:600; color:var(--header); margin-bottom:4px;}
  .note-row .note-body{font-size:13px; color:var(--sub); white-space:normal; word-break:break-word;}
  .note-edit-btn{position:absolute; top:8px; right:8px; border:none; background:none; font-size:14px; padding:2px; cursor:pointer;}
  .note-edit-area{width:100%; font-size:14px; font-family:inherit; border:1px solid var(--border); border-radius:6px; padding:6px; resize:vertical;}
  .note-edit-actions{display:flex; gap:8px; margin-top:6px;}
  .note-edit-actions button{font-size:13px; padding:5px 12px; border-radius:8px; border:1px solid var(--border); background:#fff;}
  .note-save-btn{color:#fff; background:var(--teal); border-color:var(--teal);}

  /* ---- 卡片(房貸/保貸餘額用) ---- */
  .info-card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:12px;}
  .info-card h4{margin:0 0 8px; font-size:16px; color:var(--header);}

  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--card);
    border-top:1px solid var(--border); z-index:30;
  }
  nav.bottom .ntab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:9px 0 8px; font-size:14px; color:#BDBDBD; border:none; background:none;
    text-decoration:none;
  }
  nav.bottom .ntab.active{color:var(--teal); font-weight:600;}
  nav.bottom .ntab .ic{font-size:22px;}
  .hidden{display:none !important;}

  /* ---- 搜尋按鈕 ---- */
  .search-open-btn{background:none;border:none;color:#E8F5E9;font-size:22px;padding:4px 6px;cursor:pointer;line-height:1;}

  /* ---- 搜尋面板 ---- */
  .search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:0;}
  .search-panel{background:var(--card);width:100%;max-width:600px;min-height:100dvh;display:flex;flex-direction:column;}
  .search-header{display:flex;align-items:center;justify-content:space-between;background:var(--header);color:#E8F5E9;padding:16px 18px;}
  .search-title{font-size:18px;font-weight:600;}
  .search-close-btn{background:none;border:none;color:#E8F5E9;font-size:22px;cursor:pointer;padding:2px 6px;}
  .search-inputs{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  .search-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:16px;font-family:inherit;background:#FAFAF7;}
  .search-input:focus{outline:none;border-color:var(--teal);}
  .search-row{display:flex;align-items:center;gap:6px;}
  .search-year{flex:1;}
  .search-dash{color:var(--sub);font-size:18px;}
  .search-cats{display:flex;flex-wrap:wrap;gap:10px;font-size:14px;color:var(--sub);}
  .search-cats label{display:flex;align-items:center;gap:4px;cursor:pointer;}
  .search-results{flex:1;overflow-y:auto;padding:10px 16px 20px;}
  .sr-empty{color:var(--sub);font-size:14px;text-align:center;padding:30px 0;}
  .sr-group{margin-bottom:16px;}
  .sr-group-title{font-size:13px;font-weight:600;color:var(--header);margin:0 0 6px;padding:4px 0;border-bottom:1px solid var(--border);}
  .sr-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer;}
  .sr-item:active{background:#F0F4F0;}
  .sr-item .sr-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px;}
  .sr-item .sr-year{font-size:14px;font-weight:600;color:var(--text);}
  .sr-item .sr-amt{font-size:16px;font-weight:600;color:var(--green);}
  .sr-item .sr-body{font-size:13px;color:var(--sub);white-space:normal;word-break:break-word;}
  .sr-item mark{background:#FFF176;color:var(--text);border-radius:2px;padding:0 1px;}
</style>
</head>
<body>

<header>
  <div class="top-row">
    <div class="title-area">
      <div class="h-label">各類收入明細</div>
      <div class="h-sub" id="headerSub">—</div>
    </div>
    <button class="search-open-btn" id="searchOpenBtn" title="搜尋">🔍</button>
  </div>
</header>

<!-- 搜尋面板 -->
<div class="search-overlay hidden" id="searchOverlay">
  <div class="search-panel">
    <div class="search-header">
      <span class="search-title">全域搜尋</span>
      <button class="search-close-btn" id="searchCloseBtn">✕</button>
    </div>
    <div class="search-inputs">
      <input class="search-input" id="searchKeyword" type="text" placeholder="關鍵字（備註、金額、年份…）" autocomplete="off">
      <div class="search-row">
        <input class="search-input search-year" id="searchYearFrom" type="number" placeholder="從年" min="2000" max="2040">
        <span class="search-dash">—</span>
        <input class="search-input search-year" id="searchYearTo" type="number" placeholder="到年" min="2000" max="2040">
      </div>
      <div class="search-cats">
        <label><input type="checkbox" class="sc" value="dividend" checked>股利</label>
        <label><input type="checkbox" class="sc" value="foundation" checked>基金會薪資</label>
        <label><input type="checkbox" class="sc" value="tax" checked>所得稅</label>
        <label><input type="checkbox" class="sc" value="loan" checked>房貸保貸</label>
      </div>
    </div>
    <div class="search-results" id="searchResults"><p class="sr-empty">請輸入關鍵字或年份進行搜尋</p></div>
  </div>
</div>

<div class="summary-cards" id="summaryCards"></div>

<div class="policy-tabs main-tabs" id="viewTabs"></div>
<div class="view-desc" id="viewDesc"></div>

<main>
  <div id="mainView"></div>
</main>

function num(v){
  if(v===null||v===undefined) return '—';
  if(typeof v==='string') return v;
  return Math.round(v).toLocaleString('zh-Hant');
}
const CUR_YEAR = 2026; // 民國115年
const NOTE_KEY = 'incomeDividendNoteOverride_v1';
function loadNoteOverrides(){
  try{ return JSON.parse(localStorage.getItem(NOTE_KEY)) || {}; }catch(e){ return {}; }
}
function saveNoteOverride(year, text){
  const all = loadNoteOverrides();
  if(text==='') delete all[year]; else all[year] = text;
  localStorage.setItem(NOTE_KEY, JSON.stringify(all));
}
function getDividendNote(r){
  const overrides = loadNoteOverrides();
  return overrides.hasOwnProperty(r.year) ? overrides[r.year] : r.note;
}

    html += `<div class="note-row" data-taxyear="${r.taxYear}">`
      + `<div class="note-year">${r.taxYear}年度</div>`
      + `<div class="note-body"><span class="note-text">${noteText || '（無備註，點擊新增）'}</span>`
      + `<button class="note-edit-btn tax-note-btn" data-taxyear="${r.taxYear}">✏️</button></div>`
      + `</div>`;
  });
  html += '</div>';

  document.getElementById('mainView').innerHTML = html;
  document.querySelectorAll('.tax-note-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const row = btn.closest('.note-row');
      const ty = btn.dataset.taxyear;
      const current = getTaxNote(TAX_DATA.find(r=>r.taxYear==ty && r.type==='self')) || '';
      row.querySelector('.note-body').innerHTML =
        `<textarea class="note-edit-area" rows="3">${current}</textarea>`
        + `<div class="note-edit-actions">`
        + `<button class="note-save-btn" data-taxyear="${ty}">儲存</button>`
        + `<button class="note-cancel-btn">取消</button></div>`;
      row.querySelector('.note-save-btn').addEventListener('click', ()=>{
        saveTaxNoteOverride(ty, row.querySelector('.note-edit-area').value.trim());
        renderTax();
      });
      row.querySelector('.note-cancel-btn').addEventListener('click', renderTax);
    });
  });
}

/* ---- 房貸保貸 視圖 ---- */
const LOAN_NOTE_KEY = 'incomeLoanNoteOverride_v1';
function loadLoanNoteOverrides(){ try{ return JSON.parse(localStorage.getItem(LOAN_NOTE_KEY))||{}; }catch(e){ return {}; } }
function saveLoanNoteOverride(year, text){ const a=loadLoanNoteOverrides(); if(text==='') delete a[year]; else a[year]=text; localStorage.setItem(LOAN_NOTE_KEY, JSON.stringify(a)); }
function getLoanNote(r){ const a=loadLoanNoteOverrides(); return a.hasOwnProperty(r.year)?a[r.year]:r.note; }

/* ===================== 全域搜尋引擎 ===================== */
function hl(text, kw){
  if(!kw) return text;
  const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(text).replace(new RegExp(escaped,'gi'), m=>`<mark>${m}</mark>`);
}

function buildSearchIndex(){
  const items = [];

  // ---- 股利 ----
  DIVIDEND_DATA.forEach(r=>{
    const noteText = getDividendNote(r);
    items.push({
      cat:'dividend', catLabel:'股利',
      year: r.year, yearLabel:`${r.minguo}年`,
      amtLabel: r.cash ? `NT$ ${num(r.cash)}` : null,
      fields: [String(r.minguo), String(r.age), String(r.shares), String(r.cash), String(r.ratio), noteText||''].join(' '),
      note: noteText,
      summary: `現金股利 ${num(r.cash)} 元，持股 ${r.shares} 張，分配比例 ${r.ratio}`
    });
  });

  // ---- 基金會薪資 ----
  FOUNDATION_SALARY.forEach(r=>{
    const noteText = getFoundationNote(r);
    const monthsStr = r.months.map((v,i)=>v!=null?`${i+1}月${num(v)}`:'').filter(Boolean).join(' ');
    items.push({
      cat:'foundation', catLabel:'基金會薪資',
      year: r.year, yearLabel: r.minguoYear,
      amtLabel: r.total ? `NT$ ${num(r.total)}` : null,
      fields: [r.minguoYear, String(r.age), String(r.total||''), monthsStr, noteText||''].join(' '),
      note: noteText,
      summary: `年所得${r.total?num(r.total)+'元':'(未完整)'}，${r.age}歲`
    });
  });

  // ---- 所得稅 ----
  TAX_DATA.filter(r=>r.type==='self').forEach(r=>{
    const noteText = getTaxNote(r);
    const extra = TAX_DATA.filter(x=>x.taxYear===r.taxYear && x.type!=='self')
      .map(x=>`${x.type==='mom'?'媽媽':'爸爸'} 所得${num(x.income)} 退${num(x.refund)}`).join(' ');
    items.push({
      cat:'tax', catLabel:'所得稅',
      year: r.year, yearLabel:`${r.taxYear}年度(民${r.minguo}申報)`,
      amtLabel: r.refund ? `退稅 NT$ ${num(r.refund)}` : (r.pay ? `補繳 NT$ ${num(r.pay)}` : null),
      fields: [String(r.taxYear), String(r.minguo), String(r.age), String(r.income||''),
               String(r.refund||''), String(r.pay||''), r.taxInfo||'', noteText||'', extra].join(' '),
      note: noteText,
      summary: `所得總額 ${num(r.income)} 元，${r.refund?'退稅 '+num(r.refund):r.pay?'補繳 '+num(r.pay):''}，${r.taxInfo||''}`
    });
  });

  // ---- 房貸保貸：餘額快照 ----
  LOAN_BALANCE_ROWS.forEach(r=>{
    const noteText = getLoanNote(r);
    items.push({
      cat:'loan', catLabel:'房貸保貸',
      year: r.year, yearLabel: r.minguo,
      amtLabel: r.nextJan1Total ? `合計 NT$ ${num(r.nextJan1Total)}` : null,
      fields: [r.minguo, String(r.age), String(r.jan1.mortgage||''), String(r.jan1.guotai||''),
               String(r.jan1.yuanhong||''), String(r.nextJan1Total||''), noteText||''].join(' '),
      note: noteText,
      summary: `房貸${r.jan1.mortgage?num(r.jan1.mortgage):'—'}，合計${r.nextJan1Total?num(r.nextJan1Total):'—'}`
    });
  });

  // ---- 房貸保貸：還款預估 ----
  MORTGAGE_PLAN_ROWS.forEach(r=>{
    if(!r.annual && !r.actBalance) return;
    items.push({
      cat:'loan', catLabel:'房貸還款預估',
      year: r.year, yearLabel: r.minguo,
      amtLabel: r.actBalance ? `實際餘額 NT$ ${num(r.actBalance)}` : (r.estBalance ? `預估餘額 NT$ ${num(r.estBalance)}` : null),
      fields: [r.minguo, String(r.age), String(r.period||''), String(r.annual||''),
               String(r.cumRepay||''), String(r.actBalance||''), r.note||''].join(' '),
      note: r.note,
      summary: `年度還本 ${num(r.annual)}，累積 ${num(r.cumRepay)}，預估餘額 ${num(r.estBalance)}`
    });
  });

  return items;
}

function doSearch(){
  const kw = document.getElementById('searchKeyword').value.trim();
  const yearFrom = parseInt(document.getElementById('searchYearFrom').value) || 0;
  const yearTo   = parseInt(document.getElementById('searchYearTo').value)   || 9999;
  const activeCats = [...document.querySelectorAll('.sc:checked')].map(c=>c.value);

  const container = document.getElementById('searchResults');
  if(!kw && yearFrom===0 && yearTo===9999){
    container.innerHTML = '<p class="sr-empty">請輸入關鍵字或年份進行搜尋</p>';
    return;
  }

  const kwLower = kw.toLowerCase();
  const index = buildSearchIndex();

  const matched = index.filter(item=>{
    if(!activeCats.includes(item.cat)) return false;
    if(item.year < yearFrom || item.year > yearTo) return false;
    if(kw && !item.fields.toLowerCase().includes(kwLower)) return false;
    return true;
  });

  if(!matched.length){
    container.innerHTML = '<p class="sr-empty">查無符合結果</p>';
    return;
  }

  const groups = {};
  matched.forEach(item=>{
    const g = item.catLabel;
    if(!groups[g]) groups[g]=[];
    groups[g].push(item);
  });

  let html = '';
  Object.entries(groups).forEach(([label, rows])=>{
    html += `<div class="sr-group"><div class="sr-group-title">${label}（${rows.length}筆）</div>`;
    rows.forEach(item=>{
      const noteHl = item.note ? hl(item.note, kw) : '';
      const summaryHl = hl(item.summary, kw);
      html += `<div class="sr-item" data-cat="${item.cat}">`
        + `<div class="sr-head"><span class="sr-year">${hl(item.yearLabel, kw)}</span>`
        + `<span class="sr-amt">${item.amtLabel||''}</span></div>`
        + `<div class="sr-body">${summaryHl}${noteHl?'<br>'+noteHl:''}</div>`
        + `</div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;

  container.querySelectorAll('.sr-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cat = el.dataset.cat;
      closeSearch();
      currentView = cat;
      render();
    });
  });
}

function openSearch(){
  document.getElementById('searchOverlay').classList.remove('hidden');
  setTimeout(()=> document.getElementById('searchKeyword').focus(), 100);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.add('hidden');
}

render();

document.getElementById('searchOpenBtn').addEventListener('click', openSearch);
document.getElementById('searchCloseBtn').addEventListener('click', closeSearch);
document.getElementById('searchOverlay').addEventListener('click', e=>{
  if(e.target===e.currentTarget) closeSearch();
});
['searchKeyword','searchYearFrom','searchYearTo'].forEach(id=>{
  document.getElementById(id).addEventListener('input', doSearch);
});
document.querySelectorAll('.sc').forEach(cb=> cb.addEventListener('change', doSearch));
</script>
