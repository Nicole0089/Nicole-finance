<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>保單現價</title>
<style>
  :root{
    --header:#1B5E20;
    --teal:#00695C;
    --orange:#E65100;
    --bg:#F5F5F0;
    --card:#FFFFFF;
    --border:#E0E0DA;
    --text:#212121;
    --sub:#757575;
    --green:#2E7D32;
    --red:#C62828;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system,"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:74px; font-size:19px;
  }
  header{
    background:var(--header); color:#E8F5E9; padding:16px 18px 14px;
    position:sticky; top:0; z-index:20;
  }
  header .top-row{display:flex; align-items:center; justify-content:space-between;}
  header .title-area .h-label{font-size:22px; font-weight:600;}
  header .title-area .h-sub{font-size:15px; opacity:0.85; margin-top:2px;}
  .icon-btn{background:rgba(255,255,255,0.15); border:none; color:#fff; width:34px; height:34px; border-radius:8px; font-size:18px;}

  .summary-cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 16px;}
  .summary-cards .scard:first-child{grid-column:1 / -1;}
  .scard{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px;}
  .scard .lab{font-size:15px; color:var(--sub); margin:0 0 4px;}
  .scard .val{font-size:23px; font-weight:600; margin:0; white-space:nowrap;}
  .summary-cards .scard:not(:first-child) .val{font-size:19px;}
  .scard .val.diff-up{color:var(--green);}
  .scard .val.diff-down{color:var(--red);}
  .scard .val.diff-flat{color:var(--sub);}

  .policy-tabs{display:flex; gap:6px; padding:0 16px 10px;}
  .policy-tabs.main-tabs .ptab{flex:1;}
  .policy-tabs:not(.main-tabs){overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .policy-tabs:not(.main-tabs)::-webkit-scrollbar{display:none;}
  .ptab{
    flex:0 0 auto; padding:10px 14px; border-radius:20px; border:1px solid var(--border);
    background:var(--card); font-size:17px; color:var(--text); text-align:center;
  }
  .ptab.active{background:var(--teal); color:#fff; border-color:var(--teal);}
  #variantTabs .ptab{font-size:15px; padding:6px 8px; color:var(--sub); flex:1; text-align:center;}
  #variantTabs .ptab.active{background:var(--orange); border-color:var(--orange); color:#fff;}

  main{padding:0 16px;}

  .summary-table{background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:16px;}
  .summary-table table{width:auto; min-width:100%; border-collapse:collapse; font-size:16px;}
  .summary-table th,.summary-table td{padding:10px 8px; text-align:right; border-top:1px solid var(--border); white-space:nowrap;}
  .summary-table th:first-child,.summary-table td:first-child{text-align:left; position:sticky; left:0; background:var(--card); z-index:2;}
  .summary-table thead th{background:#F1F8E9; border-top:none; font-weight:600; position:sticky; top:0; z-index:3;}
  .summary-table thead th:first-child{z-index:4; background:#F1F8E9;}
  .summary-table tbody tr.current-row td{background:#FFF8E1; font-weight:600;}
  .table-scroll{overflow-x:auto; max-height:65vh;}

  .note-card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:16px; font-size:15px; color:var(--sub); line-height:1.7;}
  .note-card h4{margin:0 0 8px; font-size:17px; font-weight:600; color:var(--header); display:flex; justify-content:space-between; align-items:center;}
  .note-card h4 .edit-btn{font-size:13px; color:var(--teal); border:1px solid var(--teal); background:#fff; border-radius:8px; padding:4px 10px;}
  .note-card textarea{
    width:100%; min-height:100px; font-size:15px; padding:10px 12px; border:1px solid var(--border);
    border-radius:8px; background:#fff; color:var(--text); resize:vertical; font-family:inherit; line-height:1.6;
  }
  .note-card .note-actions{display:flex; gap:8px; margin-top:8px;}
  .note-card .note-actions button{
    flex:1; padding:9px 0; border-radius:8px; border:1px solid var(--border); background:#fff; font-size:15px; color:var(--text);
  }
  .note-card .note-actions button.primary{background:var(--teal); color:#fff; border-color:var(--teal);}

  .loan-card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:16px;}
  .loan-card h4{margin:0 0 4px; font-size:17px; font-weight:600; color:var(--header); cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
  .loan-card h4 .arrow{font-size:13px; color:var(--sub); transition:transform .2s;}
  .loan-card.collapsed .loan-body{display:none;}
  .loan-card.collapsed h4 .arrow{transform:rotate(-90deg);}
  .loan-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px;}
  .loan-row label{font-size:15px; color:var(--sub); flex:1;}
  .loan-row input[type=number]{
    width:80px; font-size:16px; padding:6px 8px; border:1px solid var(--border); border-radius:8px; text-align:right;
  }
  .loan-row input[type=range]{flex:2; accent-color:var(--teal);}
  .loan-result{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;}
  .loan-result .litem{background:#F1F8E9; border-radius:8px; padding:8px 10px;}
  .loan-result .litem .lab{font-size:13px; color:var(--sub); margin:0 0 2px;}
  .loan-result .litem .val{font-size:17px; font-weight:600; margin:0;}
  .loan-entries{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
  .loan-entry{border:1px solid var(--border); border-radius:10px; padding:10px;}
  .loan-entry-row{display:flex; align-items:center; gap:8px; margin-top:6px;}
  .loan-entry-row:first-child{margin-top:0; justify-content:space-between;}
  .loan-entry-row label{font-size:14px; color:var(--sub); width:48px;}
  .loan-entry-row input[type=date]{flex:1; font-size:15px; padding:6px 8px; border:1px solid var(--border); border-radius:8px;}
  .loan-entry-row input[type=number]{flex:1; font-size:15px; padding:6px 8px; border:1px solid var(--border); border-radius:8px; text-align:right;}
  .loan-entry-row .le-interest{font-size:13px; color:var(--sub); white-space:nowrap;}
  .loan-entry-row .le-del{border:none; background:none; color:var(--red); font-size:16px; padding:0 4px;}
  .loan-add-btn{width:100%; padding:10px 0; border:1px dashed var(--teal); border-radius:8px; background:#fff; color:var(--teal); font-size:15px;}
  .loan-note{font-size:13px; color:var(--sub); margin-top:10px; line-height:1.6;}

  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--card);
    border-top:1px solid var(--border); z-index:30;
  }
  nav.bottom .ntab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:9px 0 8px; font-size:14px; color:#BDBDBD; border:none; background:none;
    text-decoration:none;
  }
  nav.bottom .ntab.active{color:var(--teal); font-weight:600;}
  nav.bottom .ntab .ic{font-size:22px;}
  .hidden{display:none !important;}
</style>
</head>

  <div class="top-row">
    <div class="title-area">
      <div class="h-label">保單現價</div>

  <div class="scard">
    <p class="lab" id="payoutLabel">累積領回</p>
    <p class="val" id="payoutVal">NT$ 0</p>
  </div>
  <div class="scard">
    <p class="lab">總繳保費(已知)</p>
    <p class="val" id="premVal">NT$ 0</p>
  </div>
  <div class="scard" id="annCard">
    <p class="lab" id="annLabel">本年度年金領回</p>
    <p class="val" id="annVal">NT$ 0</p>
  </div>
</div>

<div class="policy-tabs main-tabs" id="policyTabs"></div>
<div class="policy-tabs" id="variantTabs"></div>

<main>
  <div id="loanCard"></div>
  <div id="tableView"></div>
  <div class="note-card" id="noteCard"></div>
</main>

const CURRENT_TW = 115; // 民國115年 = 2026年，與支出明細模組對齊的「目前」年度

let currentPolicyIdx = 0;
let currentVariantIdx = 0;

function fmt(n){
  if(n===null || n===undefined || n==='') return '—';
  return 'NT$ ' + Math.round(n).toLocaleString('zh-Hant');
}

// 取得目前選定保單的有效設定(若有variants，套用所選variant的key/sub/note，欄位設定沿用父層)
function getActivePolicy(){
  const p = POLICIES[currentPolicyIdx];
  if(p.variants){
    const v = p.variants[currentVariantIdx];
    return Object.assign({}, p, { key:v.key, sub:v.sub, note:v.note });
  }
  return p;
}

function renderTabs(){
  const wrap = document.getElementById('policyTabs');
  wrap.innerHTML = '';
  POLICIES.forEach((p,idx)=>{
    const b = document.createElement('button');
    b.className = 'ptab' + (idx===currentPolicyIdx?' active':'');
    b.textContent = p.label;
    b.onclick = ()=>{ currentPolicyIdx = idx; currentVariantIdx = 0; render(); };
    wrap.appendChild(b);
  });

  const vwrap = document.getElementById('variantTabs');
  const p = POLICIES[currentPolicyIdx];
  if(p.variants){
    vwrap.classList.remove('hidden');
    vwrap.innerHTML = '';
    p.variants.forEach((v,idx)=>{
      const b = document.createElement('button');
      b.className = 'ptab' + (idx===currentVariantIdx?' active':'');
      b.textContent = v.label;
      b.onclick = ()=>{ currentVariantIdx = idx; render(); };
      vwrap.appendChild(b);
    });
  } else {
    vwrap.classList.add('hidden');
    vwrap.innerHTML = '';
  }
}

function findCurrentRow(rows){
  return rows.find(r=>r.tw===CURRENT_TW) || rows[rows.length-1];
}

function render(){
  renderTabs();
  const p = getActivePolicy();
  const rows = SEED_DATA[p.key] || [];
  document.getElementById('policySub').textContent = p.sub;
  document.getElementById('payoutLabel').textContent = p.payoutLabel;

  const curRow = findCurrentRow(rows);
  const curTw = curRow ? curRow.tw : CURRENT_TW;
  document.getElementById('cvLabel').textContent = curTw + '年(' + (curRow?curRow.ce:'') + ') 總現價';
  document.getElementById('cvVal').textContent = fmt(curRow ? curRow[p.cvField] : null);

  const incEl = document.getElementById('cvIncVal');
  const incVal = curRow ? curRow[p.incField] : null;
  incEl.textContent = fmt(incVal);
  incEl.className = 'val' + (incVal>0?' diff-up':incVal<0?' diff-down':'');

  document.getElementById('payoutVal').textContent = fmt(curRow ? curRow[p.payoutField] : null);
  document.getElementById('premVal').textContent = fmt(p.totalPrem);

  const annCard = document.getElementById('annCard');
  if(p.annField){
    annCard.classList.remove('hidden');
    document.getElementById('annLabel').textContent = curTw + '年(' + (curRow?curRow.ce:'') + ') 年金領回';
    document.getElementById('annVal').textContent = fmt(curRow ? curRow[p.annField] : null);
  } else {
    annCard.classList.add('hidden');
  }

  renderLoan(p, curRow, curTw);
  renderTable(p, rows, curTw);
  renderNote(p);
}

const LOAN_KEY = 'policyValueLoanSettings_v1';
function loadLoanSettings(){
  try{ return JSON.parse(localStorage.getItem(LOAN_KEY)) || {}; }catch(e){ return {}; }
}
function saveLoanSettings(obj){ localStorage.setItem(LOAN_KEY, JSON.stringify(obj)); }

function renderLoan(p, curRow, curTw){
  const wrap = document.getElementById('loanCard');
  if(p.key==='總表' || !curRow){
    wrap.innerHTML = '';
    return;
  }
  const cv = curRow[p.cvField] || 0;
  const all = loadLoanSettings();
  const s = Object.assign({ ratio:80, entries:[], collapsed:true }, all[p.key]);
  if(!Array.isArray(s.entries)) s.entries = [];
  const maxLoan = Math.round(cv * s.ratio / 100);

  const totalAmount = s.entries.reduce((sum,e)=> sum + (Number(e.amount)||0), 0);
  const totalInterest = s.entries.reduce((sum,e)=> sum + Math.round((Number(e.amount)||0) * (Number(e.rate)||0) / 100), 0);
  const remainLimit = maxLoan - totalAmount;
  const remainCv = cv - totalAmount;

  const persist = ()=>{ all[p.key] = s; saveLoanSettings(all); };

  const rowsHtml = s.entries.map((e,idx)=>{
    const ei = Math.round((Number(e.amount)||0) * (Number(e.rate)||0) / 100);
    return `
      <div class="loan-entry" data-idx="${idx}">
        <div class="loan-entry-row">
          <input type="date" class="le-date" value="${e.date||''}">
          <button class="le-del">✕</button>
        </div>
        <div class="loan-entry-row">
          <label>金額</label>
          <input type="number" class="le-amount" step="10000" value="${e.amount||0}">
        </div>
        <div class="loan-entry-row">
          <label>利率%</label>
          <input type="number" class="le-rate" step="0.1" value="${e.rate||0}">
          <span class="le-interest">年息 ${fmt(ei)}</span>
        </div>
      </div>
    `;
  }).join('');

  wrap.innerHTML = `
    <div class="loan-card${s.collapsed?' collapsed':''}" id="loanCardInner">
      <h4 id="loanToggle">保單貸款試算 <span class="arrow">▾</span></h4>
      <div class="loan-body">
        <div class="loan-row">
          <label>貸款成數</label>
          <input type="number" id="loanRatio" min="0" max="100" step="1" value="${s.ratio}"> %
        </div>
        <div class="loan-result">
          <div class="litem"><p class="lab">可貸上限(${curTw}年現價×${s.ratio}%)</p><p class="val">${fmt(maxLoan)}</p></div>
          <div class="litem"><p class="lab">剩餘可貸額度</p><p class="val">${fmt(remainLimit)}</p></div>
          <div class="litem"><p class="lab">貸款總額</p><p class="val">${fmt(totalAmount)}</p></div>
          <div class="litem"><p class="lab">年利息合計</p><p class="val">${fmt(totalInterest)}</p></div>
          <div class="litem" style="grid-column:1/-1"><p class="lab">貸款後剩餘現價</p><p class="val">${fmt(remainCv)}</p></div>
        </div>
        <div class="loan-entries" id="loanEntries">${rowsHtml}</div>
        <div class="loan-row">
          <button id="loanAddEntry" class="loan-add-btn">+ 新增一筆貸款</button>
        </div>
        <div class="loan-note">※僅供試算參考，實際可貸成數與利率依各保險公司公告及保單條款為準。每筆貸款可分別輸入日期、金額與利率，系統會各自計算年息後加總。貸款本金與利息將從保單現價中扣除，未償還的利息會持續複利累積。</div>
      </div>
    </div>
  `;

  document.getElementById('loanToggle').onclick = ()=>{
    s.collapsed = !s.collapsed;
    persist();
    renderLoan(p, curRow, curTw);
  };
  document.getElementById('loanRatio').onchange = (e)=>{
    s.ratio = Math.max(0, Math.min(100, Number(e.target.value)||0));
    persist();
    renderLoan(p, curRow, curTw);
  };
  document.getElementById('loanAddEntry').onclick = ()=>{
    const today = new Date().toISOString().slice(0,10);
    s.entries.push({ date: today, amount: 0, rate: 6 });
    persist();
    renderLoan(p, curRow, curTw);
  };

  wrap.querySelectorAll('.loan-entry').forEach(el=>{
    const idx = Number(el.dataset.idx);
    el.querySelector('.le-date').onchange = (e)=>{ s.entries[idx].date = e.target.value; persist(); };
    el.querySelector('.le-amount').onchange = (e)=>{ s.entries[idx].amount = Number(e.target.value)||0; persist(); renderLoan(p, curRow, curTw); };
    el.querySelector('.le-rate').onchange = (e)=>{ s.entries[idx].rate = Number(e.target.value)||0; persist(); renderLoan(p, curRow, curTw); };
    el.querySelector('.le-del').onclick = ()=>{ s.entries.splice(idx,1); persist(); renderLoan(p, curRow, curTw); };
  });
}


function renderTable(p, rows, curTw){
  const wrap = document.getElementById('tableView');
  let html = '<div class="summary-table"><div class="table-scroll"><table><thead><tr>';
  p.columns.forEach(c=> html += `<th>${c.t}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(r=>{
    const cls = r.tw===curTw ? ' class="current-row"' : '';
    html += `<tr${cls}>`;
    p.columns.forEach(c=>{
      const v = r[c.f];
      if(c.f==='tw' || c.f==='ce' || c.f==='age'){
        html += `<td>${v!==null && v!==undefined ? v : '—'}</td>`;
      } else {
        html += `<td>${v!==null && v!==undefined ? Number(v).toLocaleString('zh-Hant') : '—'}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  wrap.innerHTML = html;

  // 自動捲動到目前年度
  setTimeout(()=>{
    const cur = wrap.querySelector('.current-row');
    const scroll = wrap.querySelector('.table-scroll');
    if(cur && scroll) scroll.scrollTop = cur.offsetTop - scroll.offsetTop - 80;
  }, 0);
}

const NOTES_KEY = 'policyValueNotesOverride_v1';
function loadNoteOverrides(){
  try{ return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }catch(e){ return {}; }
}
function saveNoteOverrides(obj){ localStorage.setItem(NOTES_KEY, JSON.stringify(obj)); }

function defaultNoteHtml(p){
  if(p.note) return p.note;
  if(p.key==='國寶') return '國寶人壽3張保單(國泰(1)/(2)/(3))之現價、年增現價、累積領回合計值。';
  return '國泰(國寶)與遠雄兩張保單現價合計總表。年增現價=今年總現價－去年總現價。表格中以淺黃色標示目前年度('+CURRENT_TW+'年)。<br>本表為保單建議書之預估現價，未來實際金額將依保險公司每年公告調整。';
}

function renderNote(p){
  const wrap = document.getElementById('noteCard');
  const overrides = loadNoteOverrides();
  const overrideHtml = overrides[p.key];
  const displayHtml = overrideHtml!==undefined ? overrideHtml : defaultNoteHtml(p);

  wrap.innerHTML = `
    <h4>說明 <button class="edit-btn" id="noteEditBtn">編輯</button></h4>
    <div id="noteDisplay">${displayHtml}</div>
  `;

  document.getElementById('noteEditBtn').onclick = ()=>{
    wrap.innerHTML = `
      <h4>說明</h4>
      <textarea id="noteEditArea">${escapeHtmlNote(overrideHtml!==undefined ? overrideHtml : defaultNoteHtml(p))}</textarea>
      <div class="note-actions">
        <button id="noteCancelBtn">取消</button>
        ${overrideHtml!==undefined?'<button id="noteResetBtn">還原預設</button>':''}
        <button class="primary" id="noteSaveBtn">儲存</button>
      </div>
    `;
    document.getElementById('noteCancelBtn').onclick = ()=> renderNote(p);
    document.getElementById('noteSaveBtn').onclick = ()=>{
      const val = document.getElementById('noteEditArea').value;
      const ov = loadNoteOverrides();
      ov[p.key] = val;
      saveNoteOverrides(ov);
      renderNote(p);
    };
    const resetBtn = document.getElementById('noteResetBtn');
    if(resetBtn) resetBtn.onclick = ()=>{
      const ov = loadNoteOverrides();
      delete ov[p.key];
      saveNoteOverrides(ov);
      renderNote(p);
    };
  };
}

function escapeHtmlNote(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

render();
</script>

</html>
